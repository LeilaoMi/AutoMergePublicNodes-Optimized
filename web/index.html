<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoNodes 动态订阅网关</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full bg-gray-800 rounded-xl shadow-2xl p-8">
        <h1 class="text-3xl font-bold mb-2 text-center text-blue-400">AutoNodes 动态网关</h1>
        <p class="text-center text-gray-400 mb-8">纯客户端过滤，零服务器开销，实时生成专属订阅</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">选择地区 (留空为全部)</label>
                <input type="text" id="regions" placeholder="例如: HK,JP,US" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">选择协议 (留空为全部)</label>
                <input type="text" id="protocols" placeholder="例如: vless,trojan,ss" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 mb-8">
            <button id="btn-generate" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200">
                生成 Base64 订阅
            </button>
            <button id="btn-yaml" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200">
                生成 Clash YAML
            </button>
        </div>

        <div id="loading" class="hidden flex justify-center my-4"><div class="loader"></div></div>
        
        <div id="result" class="hidden">
            <label class="block text-sm font-medium text-gray-300 mb-2">订阅结果 (<span id="node-count" class="text-blue-400">0</span> 个节点)</label>
            <textarea id="output" readonly class="w-full h-40 bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm font-mono text-green-400 outline-none"></textarea>
            <button id="btn-copy" class="mt-4 w-full bg-gray-700 hover:bg-gray-600 text-white py-2 rounded-lg transition">复制到剪贴板</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
