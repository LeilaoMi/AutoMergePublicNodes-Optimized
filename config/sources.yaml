# ============================================================
# 订阅源配置 - 经过审计的活跃源（2026 年仍在更新）
# ============================================================
# 字段说明：
#   url:               订阅 URL，支持 %Y/%m/%d 动态日期模板
#   name:              来源标识（用于审计报告）
#   kind:              url(单订阅) | list(订阅列表) | dynamic(动态URL)
#   enabled:           是否启用
#   ignore_protocols:  忽略的协议（例如 [ssr, ss]）
#   max_nodes:         单源最大节点数（0=不限）
# ============================================================

sources:
  # ─────────────────────────────────────────────
