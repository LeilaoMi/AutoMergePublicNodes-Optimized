mixed-port: 7890
allow-lan: false
mode: rule
proxies: []
proxy-groups:
- name: 🚀 Proxy
  type: select
  proxies:
  - ♻️ Auto
- name: ♻️ Auto
  type: url-test
  proxies:
  - DIRECT
  url: https://www.gstatic.com/generate_204
  interval: 600
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
  - https://223.5.5.5/dns-query
  - https://114.114.114.114/dns-query
  fallback:
  - https://1.1.1.1/dns-query
  - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
tun:
  enable: true
  stack: system
  dns-hijack:
  - any:53
  auto-route: true
  auto-detect-interface: true
rules:
- GEOSITE,category-ads-all,REJECT
- GEOSITE,cn,DIRECT
- GEOIP,CN,DIRECT
- GEOSITE,geolocation-!cn,🚀 Proxy
- MATCH,🚀 Proxy
