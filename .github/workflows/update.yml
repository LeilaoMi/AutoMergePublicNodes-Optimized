name: Update Nodes

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      skip_real_test:
        description: '跳过真实代理测试'
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml requests
          pip install git+https://github.com/peasoft/requests-file.git

      - name: Fetch nodes
        run: |
          python fetch.py
          if [ -f list.yml ]; then
            TOTAL=$(grep -c "type:" list.yml || echo "0")
            echo "抓取节点: $TOTAL"
          fi
        continue-on-error: true

      - name: TCP connectivity test
        run: |
          if [ -f list.yml ]; then
            python filter.py
            if [ -f list.txt ]; then
              VALID=$(wc -l < list.txt)
              echo "TCP可达节点: $VALID"
            fi
          fi

      - name: Download Xray
        if: ${{ github.event.inputs.skip_real_test != 'true' }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | jq -r '.tag_name')
          curl -L -o xray.zip "https://github.com/XTLS/Xray-core/releases/download/${VERSION}/Xray-linux-64.zip"
          unzip -o xray.zip
          chmod +x xray
          echo "Xray ${VERSION} 下载完成"

      - name: Real proxy test
        if: ${{ github.event.inputs.skip_real_test != 'true' && hashFiles('list.yml') != '' }}
        run: |
          python xray_test.py list.yml --output valid_nodes.txt --timeout 10 --concurrent 50
          if [ -s valid_nodes.txt ]; then
            VALID=$(wc -l < valid_nodes.txt)
            echo "真实可用节点: $VALID"
          fi

      - name: Filter valid nodes
        if: ${{ hashFiles('valid_nodes.txt') != '' && hashFiles('list.yml') != '' }}
        run: python filter_valid.py

      - name: Generate output
        run: |
          mkdir -p output
          if [ -f list.yml ]; then
            python generate_output.py
            TOTAL=$(grep -c "type:" list.yml || echo "0")
            echo "最终节点: $TOTAL"
          fi
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add output/ list.yml list.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update: $(date '+%Y-%m-%d %H:%M')"
          git push

      - name: Purge CDN
        if: success()
        run: |
          REPO="${{ github.repository }}"
          BRANCH="main"
          for f in clash.yml list.txt; do
            curl -s "https://purge.jsdelivr.net/gh/${REPO}@${BRANCH}/output/${f}" || true
          done
