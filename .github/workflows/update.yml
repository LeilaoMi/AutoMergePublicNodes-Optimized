name: Update Nodes

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'sources.list'
      - 'config.yml'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch nodes
        run: |
          python3 fetch.py

      - name: Filter nodes (TCP test)
        run: |
          python3 filter.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Update nodes $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: Purge jsDelivr cache
        run: |
          REPO="${{ github.repository }}"
          BRANCH="main"
          FILES="list.txt list.yml list.meta.yml"
          URLS=""
          for f in $FILES; do
            URLS="${URLS}https://cdn.jsdelivr.net/gh/${REPO}@${BRANCH}/${f},"
          done
          curl -s "https://purge.jsdelivr.net/${URLS%,}" || true
